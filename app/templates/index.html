<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>德州扑克牌桌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css?v=20260610-01">
  </head>
  <body class="app-body">
    <main class="lobby-shell">
      <section class="lobby-hero">
        <div class="hero-copy">
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true">♠</span>
            <div>
              <div class="eyebrow">服务端权威联机牌桌</div>
              <strong>Ivory Private Table</strong>
            </div>
          </div>
          <h1>德州扑克</h1>
          <p>
            本游戏仅使用虚拟筹码，不涉及真钱、充值、提现、赌博结算或任何博彩 API。
          </p>
          <div class="hero-metrics">
            <div><strong>20</strong><span>最大座位</span></div>
            <div><strong>10K</strong><span>初始筹码</span></div>
            <div><strong>实时</strong><span>WebSocket 同步</span></div>
          </div>
          <div class="hero-note">优雅私享牌局体验，清晰操作，沉浸对局。</div>
        </div>

        <section class="lobby-panel" aria-label="房间操作">
          <div class="panel-title">
            <div>
              <div class="eyebrow">开始</div>
              <h2>创建或加入房间</h2>
            </div>
            <span>训练筹码</span>
          </div>

          <div class="field register-field">
            <span>昵称</span>
            <div class="register-row">
              <input id="nickname" maxlength="24" autocomplete="nickname" placeholder="输入昵称">
              <button id="register-user" type="button" class="ghost-button">注册昵称</button>
            </div>
            <em id="registration-status" class="registration-status">注册后可防止昵称重复。</em>
          </div>

          <div class="blind-row">
            <label class="field">
              <span>小盲</span>
              <input id="small-blind" type="number" min="1" value="50">
            </label>
            <label class="field">
              <span>大盲</span>
              <input id="big-blind" type="number" min="1" value="100">
            </label>
          </div>

          <label class="check-field ai-default-field">
            <input id="ai-default" type="checkbox">
            <span>
              <strong>开启 AI 助手</strong>
              <em>房主控制本房间 AI 助手；开启后所有玩家显示，关闭后所有玩家关闭。</em>
            </span>
          </label>

          <button id="create-room" type="button" class="primary-button">创建房间</button>

          <div class="join-divider"><span>或输入房间号加入</span></div>

          <label class="field">
            <span>房间号</span>
            <input id="room-code" maxlength="8" placeholder="例如 A7K92D">
          </label>
          <button id="join-room" type="button" class="secondary-button">加入房间</button>
          <p id="lobby-error" class="error-line" role="alert"></p>
        </section>
      </section>

      <section class="lobby-grid">
        <section class="room-list-panel">
          <div class="section-title-row">
            <div>
              <div class="eyebrow">开放牌桌</div>
              <h2>最近房间</h2>
            </div>
            <button id="refresh-rooms" type="button" class="ghost-button">刷新</button>
          </div>
          <div id="room-list" class="room-list"></div>
        </section>

        <section class="guide-panel">
          <div class="eyebrow">流程</div>
          <h2>进入游戏前</h2>
          <ol>
            <li>创建房间或加入已有房间。</li>
            <li>选择空座位坐下。</li>
            <li>准备后由房主开始牌局。</li>
            <li>轮到你时按服务端给出的合法动作操作。</li>
          </ol>
        </section>
      </section>
    </main>

    <script src="/static/js/index.js?v=20260610-01" defer></script>
  </body>
</html>
