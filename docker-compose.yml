services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holdem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d holdem"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      HOLDEM_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/holdem
      HOLDEM_REDIS_URL: redis://redis:6379/0
      HOLDEM_INIT_DB: "true"
      HOLDEM_GUEST_INITIAL_CHIPS: "10000"
      HOLDEM_DEFAULT_SMALL_BLIND: "50"
      HOLDEM_DEFAULT_BIG_BLIND: "100"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
